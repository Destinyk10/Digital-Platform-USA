<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Platform USA - Buy Bitcoin Instantly</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background: #000; 
      color: #fff; 
      text-align: center; 
      margin: 0; 
      padding: 20px 0;
    }
    .hero { 
      width: 100%; 
      max-width: 500px; 
      height: auto; 
      border-radius: 12px; 
      margin: 20px auto;
    }
    h1 { 
      color: #ff9800; 
      font-size: 28px; 
      margin: 10px 0; 
    }
    h2 { 
      color: #ccc; 
      font-weight: 400; 
      margin-top: 0; 
    }
  </style>
</head>
<body>

<div id="crypto-ticker" style="background:#1a1a1a; color:#ff9800; padding:12px; font-weight:bold; text-align:center; margin:0 20px 20px 20px; border-radius:8px; font-size:13px;">
  Loading Prices...
</div>
<script>
fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,tether&vs_currencies=usd')
.then(r=>r.json())
.then(d=>{
  document.getElementById('crypto-ticker').innerHTML = 
    `₿ BTC: $${d.bitcoin.usd.toLocaleString()} | Ξ ETH: $${d.ethereum.usd.toLocaleString()} | ₮ USDT: $${d.tether.usd}`
});
</script>

<div style="max-width:500px; margin:auto;">
  <h1>Digital Platform USA</h1>
  <img src="hero.jpg" class="hero" alt="Bitcoin NYC">
  <h2>Your Crypto Trading Partner</h2>
  <p>Buy & Trade Bitcoin in the USA</p>

  <div style="background:#111; padding:20px; border-radius:12px; margin:20px;">
    <h3 style="color:#4da3ff; margin:0 0 10px 0;">Live USD Calculator</h3>
    <input id="usdInput" type="number" placeholder="Enter USD amount" 
           style="padding:12px; width:85%; border:none; border-radius:8px; font-size:16px; text-align:center;">
    <p style="margin:15px 0 5px 0;">You get: <strong id="ngnOutput" style="color:#4da3ff; font-size:18px;">₦0</strong></p>
    <small style="color:#888;">Rate: ₦1,650 per $1</small>
  </div>
  <script>
    const RATE = 1650;
    document.getElementById('usdInput').addEventListener('input', e => {
      let usd = parseFloat(e.target.value) || 0;
      document.getElementById('ngnOutput').innerText = '₦' + (usd * RATE).toLocaleString();
    });
  </script>

  <div style="background:#111; padding:20px; border-radius:12px; margin:20px;">
    <h3 style="color:#4da3ff; margin:0 0 10px 0;">Order Instantly</h3>
    <input id="clientName" placeholder="Your Name" 
           style="padding:12px; width:85%; margin:5px 0; border:none; border-radius:8px; font-size:16px;">
    <input id="buyAmount" type="number" placeholder="USD Amount" 
           style="padding:12px; width:85%; margin:5px 0; border:none; border-radius:8px; font-size:16px;">
    <button onclick="sendOrder()" 
            style="background:#25D366; color:#fff; border:none; padding:15px; width:90%; border-radius:8px; font-size:16px; font-weight:bold; margin-top:10px; cursor:pointer;">
      💬 Order on WhatsApp
    </button>
  </div>
</div>

<script>
function sendOrder(){
  let name = document.getElementById('clientName').value;
  let amount = document.getElementById('buyAmount').value;
  let text = `Hi Digital Platform USA, I'm ${name}. I want to buy $${amount} worth of Bitcoin.`;
  window.open(`https://wa.me/qr/LOQ7A26VJ2DFF1?text=${encodeURIComponent(text)}`, '_blank');
}
</script>

</body>
</html>
