<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        let password = "eruemrejovwo@@33";
        let pass = prompt("Enter password:");
        if (pass !== password) {
            document.body.innerHTML = "Access denied";
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Digital Platform USA - Bitcoin Trading</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
            background: #0a0a0a;
            color: #fff;
        }
        .hero {
            width: 100%;
            max-width: 600px;
            height: auto;
            border-radius: 12px;
            margin: 20px auto;
            box-shadow: 0 4px 20px rgba(247, 147, 26, 0.3);
        }
        h1 { 
            color: #f7931a; 
            font-size: 2.5rem; 
            margin-bottom: 10px; 
        }
        h2 { 
            color: #4da3ff; 
            font-weight: 400; 
            margin-top: 0; 
        }
    </style>
</head>
<body>

<div id="btc-ticker" style="background:#1a1a1a; color:#ff9800; padding:12px; font-weight:bold; text-align:center; margin:0 20px 20px 20px; border-radius:8px;">
  Loading BTC Price...
</div>
<script>
fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd')
.then(r=>r.json())
.then(d=>{
  document.getElementById('btc-ticker').innerHTML = `₿ BTC/USD: $${d.bitcoin.usd.toLocaleString()}`;
});
</script>

<div style="max-width:500px; margin:auto;">
  <h1>Digital Platform USA</h1>
  <img src="hero.jpg" class="hero" alt="Bitcoin NYC">
  <h2>Your Crypto Trading Partner</h2>
  <p>Buy & Trade Bitcoin in the USA</p>

  <div style="background:#111; padding:20px; border-radius:12px; margin:20px auto; max-width:400px;">
    <h3 style="color:#4da3ff; margin:0 0 10px 0;">Live Calculator</h3>
    <input id="usdInput" type="number" placeholder="Enter USD Amount" 
           style="padding:12px; width:85%; border:none; border-radius:8px; text-align:center; font-size:16px; margin:5px;">
    <p style="margin:15px 0 5px 0;">You get: <strong style="color:#ff9800; font-size:1.4rem;">₦<span id="ngnOutput">0</span></strong></p>
    <small style="color:#888;">Rate: ₦1,650 per $1</small>
  </div>
  <script>
  const RATE = 1650;
  document.getElementById('usdInput').addEventListener('input', function(e) {
    let usd = parseFloat(e.target.value) || 0;
    document.getElementById('ngnOutput').innerText = (usd * RATE).toLocaleString();
  });
  </script>

  <div style="background:#111; padding:20px; border-radius:12px; margin:20px auto; max-width:400px;">
    <h3 style="color:#4da3ff; margin:0 0 10px 0;">Start Your Order</h3>
    <input id="clientName" placeholder="Your Name" 
           style="padding:12px; width:85%; margin:5px; border:none; border-radius:8px;">
    <input id="buyAmount" type="number" placeholder="Amount in USD" 
           style="padding:12px; width:85%; margin:5px; border:none; border-radius:8px;">
    <button onclick="sendOrder()"
            style="background:#25D366; color:white; padding:14px; width:90%; border:none; border-radius:8px; font-weight:bold; margin-top:10px; font-size:16px;">
      💬 Order on WhatsApp
    </button>
  </div>

<script>
function sendOrder(){
  let name = document.getElementById('clientName').value || 'Client';
  let amount = document.getElementById('buyAmount').value || '0';
  let text = `Hi Digital Platform USA, I'm ${name}. I want to buy $${amount} worth of BTC. What's your current rate?`;
  window.open(`https://wa.me/qr/LOQ7A26VJ2DFF1?text=${encodeURIComponent(text)}`, '_blank');
}
</script>

</body>
</html>
